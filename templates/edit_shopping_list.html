<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Shopping List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background: #f9f9f9;
        }
        .card {
            background: white;
            padding: 16px;
            border-radius: 8px;
            max-width: 700px;
            margin: 24px auto;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        label { font-weight: bold; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 4px;
            margin-bottom: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button, input[type="submit"] {
            appearance: none;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            background: #2563eb;
            color: white;
        }
        .btn-secondary {
            background: #e5e7eb;
            color: #111827;
            margin-top: 8px;
        }
        .column-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .column {
            border: 1px solid #ccc;
            padding: 16px;
            border-radius: 8px;
            background: #f9f9f9;
        }
        .column h3 {
            margin-top: 0;
        }
        .item-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .item-row input {
            flex: 1;
            margin-bottom: 0;
            margin-top: 0;
        }
        .remove-btn {
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            width: auto;
        }
        .remove-btn:hover {
            background: #b91c1c;
        }
        .add-btn {
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin-top: 8px;
        }
        .add-btn:hover {
            background: #15803d;
        }
        @media (max-width: 768px) {
            .column-wrapper {
                grid-template-columns: 1fr;
            }
            body {
                padding: 8px;
            }
            .card {
                margin: 16px auto;
                padding: 12px;
            }
            input[type="submit"] {
                font-size: 14px;
                padding: 10px 12px;
            }
            .item-row {
                gap: 4px;
            }
            .remove-btn {
                padding: 6px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Edit Shopping List</h2>
        <form action="/update-shopping-list" method="post">
            <div class="column-wrapper">
                <div class="column">
                    <h3>Order Every Week</h3>
                    <div id="order-items">
                        {% for item in order_every_week[1:] %}
                        <div class="item-row">
                            <input type="text" name="order_every_week[]" value="{{ item }}">
                            <button type="button" class="remove-btn" onclick="this.parentNode.remove()">Remove</button>
                        </div>
                        {% endfor %}
                    </div>
                    <button type="button" class="add-btn" onclick="addOrderItem()">+ Add Item</button>
                </div>

                <div class="column">
                    <h3>Check Every Week</h3>
                    <div id="check-items">
                        {% for item in check_every_week[1:] %}
                        <div class="item-row">
                            <input type="text" name="check_every_week[]" value="{{ item }}">
                            <button type="button" class="remove-btn" onclick="this.parentNode.remove()">Remove</button>
                        </div>
                        {% endfor %}
                    </div>
                    <button type="button" class="add-btn" onclick="addCheckItem()">+ Add Item</button>
                </div>
            </div>

            <input type="submit" value="Save Changes" style="margin-top: 20px;">
        </form>

        <form action="/" method="get">
            <button type="submit" class="btn-secondary">Cancel</button>
        </form>
    </div>

    <script>
        function addOrderItem() {
            const container = document.getElementById('order-items');
            const itemRow = document.createElement('div');
            itemRow.className = 'item-row';
            itemRow.innerHTML = '<input type="text" name="order_every_week[]" value=""><button type="button" class="remove-btn" onclick="this.parentNode.remove()">Remove</button>';
            container.appendChild(itemRow);
        }

        function addCheckItem() {
            const container = document.getElementById('check-items');
            const itemRow = document.createElement('div');
            itemRow.className = 'item-row';
            itemRow.innerHTML = '<input type="text" name="check_every_week[]" value=""><button type="button" class="remove-btn" onclick="this.parentNode.remove()">Remove</button>';
            container.appendChild(itemRow);
        }
    </script>
</body>
</html>
